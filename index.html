<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #f1f1f1;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Bienvenido a mi sitio web</h1>
</header>

<main>
    <h2>Inicio</h2>
    <p>Este es un ejemplo de página HTML básica.</p>
    <button onclick="mostrarMensaje()">Haz clic aquí</button>
</main>

<footer>
    <p>© 2026 Mi sitio</p>
</footer>

<script>
    function mostrarMensaje() {
        alert("¡Hola! Este es un mensaje de ejemplo.");
    }
</script>
</body>
</html>
